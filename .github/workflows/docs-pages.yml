name: Deploy Docs Site

on:
  workflow_dispatch:

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Determine Pages base path
        id: pages_base
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"

          if [ "${repo_name}" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "base_path=/" >> "${GITHUB_OUTPUT}"
          else
            echo "base_path=/${repo_name}/" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build demo
        run: npm run build -- --base "${{ steps.pages_base.outputs.base_path }}"

      - name: Build API docs
        run: npm run docs

      - name: Build Storybook
        run: npm run build-storybook -- --output-dir storybook-static

      - name: Assemble Pages site
        run: |
          rm -rf .pages-site
          mkdir -p .pages-site/api .pages-site/api/docs .pages-site/storybook
          cp -R dist/. .pages-site/
          cp -R docs/api/. .pages-site/api/
          cp docs/INSTALL_PLUS.md docs/DEVELOPER_GUIDE.md docs/RELEASE.md .pages-site/api/docs/
          cp -R storybook-static/. .pages-site/storybook/
          touch .pages-site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write workflow summary
        run: |
          page_url="${{ steps.deployment.outputs.page_url }}"
          {
            echo "## Docs Site"
            echo
            echo "- Demo: ${page_url}"
            echo "- Storybook: ${page_url}storybook/"
            echo "- API docs: ${page_url}api/"
          } >> "${GITHUB_STEP_SUMMARY}"
